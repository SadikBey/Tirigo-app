name: tirigo
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  intl: ^0.18.0
  cloud_firestore: ^6.1.1
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_storage: ^13.1.0
  google_sign_in: ^6.2.0
  font_awesome_flutter: ^11.0.0
  image_picker: ^1.0.0
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutterfire_cli: ^1.3.1
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/Trigo_logo.png
    - assets/images/Trigo_logo2.png
    - assets/images/tirigo_yazi_logo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/google_icon.png"